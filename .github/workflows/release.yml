name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk indigo-insights-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Indigo Insights ${{ github.ref_name }}
          body: |
            ## Indigo Insights ${{ github.ref_name }}

            Protocol analytics dashboard for the Indigo community.

            ### Web App
            🌐 [Open Web App](https://nyorok.github.io/IndigoInsights) — install as a PWA directly from your browser for the best mobile experience.
          files: indigo-insights-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
